<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Details - Calanit 16</title>
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
    <a href="index.html" class="back-button">
        ←
    </a>

    <div class="container">
        <div id="property-container">
            <div class="loading">Loading property details...</div>
        </div>
    </div>

    <script type="module">
        import { getParkingData, getResidentsData, getResidentsForParking } from './src/js/data.js';

        /**
         * Get parking IDs from URL query parameter
         */
        function getParkingIdsFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            return id ? id.split(',') : [];
        }

        /**
         * Get display number from parking ID
         */
        function getParkingNumber(parkingId) {
            // Return full parking ID as in Google Sheets (e.g., "P-001")
            return parkingId;
        }

        /**
         * Create wheelchair icon
         */
        function createWheelchairIcon() {
            const icon = document.createElement('div');
            icon.className = 'wheelchair-icon';
            icon.innerHTML = '♿';
            return icon;
        }

        /**
         * Generate WhatsApp link
         */
        function generateWhatsAppLink(phone, firstName, parkingId) {
            // Remove non-digit characters from phone
            const cleanPhone = phone.replace(/\D/g, '');
            // Add Israel country code if not present
            const phoneNumber = cleanPhone.startsWith('972') ? cleanPhone : `972${cleanPhone.substring(1)}`;

            const message = `Hi ${firstName}, Can I borrow your parking space ${getParkingNumber(parkingId)} for a short time?`;
            return `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
        }

        /**
         * Create resident card element
         */
        function createResidentCard(resident, parkingId) {
            const card = document.createElement('div');
            card.className = 'resident-card';

            const name = document.createElement('div');
            name.className = 'resident-name';
            name.textContent = `${resident.first_name} ${resident.family_name}`;
            card.appendChild(name);

            const apartment = document.createElement('div');
            apartment.className = 'resident-apartment';
            apartment.textContent = `Apartment ${resident.apartment}`;
            card.appendChild(apartment);

            const whatsappLink = document.createElement('a');
            whatsappLink.className = 'contact-link';
            whatsappLink.href = generateWhatsAppLink(resident.phone, resident.first_name, parkingId);
            whatsappLink.target = '_blank';
            whatsappLink.innerHTML = `
                <svg class="whatsapp-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                </svg>
                ${resident.phone}
            `;
            card.appendChild(whatsappLink);

            return card;
        }

        /**
         * Render property details
         */
        async function renderPropertyDetails() {
            try {
                const parkingIds = getParkingIdsFromUrl();

                if (parkingIds.length === 0) {
                    throw new Error('No parking ID specified');
                }

                const parkingData = await getParkingData();
                const residentsData = await getResidentsData();

                const container = document.getElementById('property-container');
                container.innerHTML = '';

                // Create property card
                const card = document.createElement('div');
                card.className = 'property-card';

                // Header with parking number(s)
                const header = document.createElement('div');
                header.className = 'property-header';

                const title = document.createElement('h2');
                title.className = 'property-title';

                // Get parking details
                // If parking not found in data, create virtual object (for tandem partners)
                const parkingSpaces = parkingIds.map(id => {
                    let parking = parkingData.find(p => p.parking_id === id);
                    if (!parking) {
                        // Create virtual parking object for missing tandem partner
                        parking = {
                            parking_id: id,
                            type: 'tandem',
                            linked_id: ''
                        };
                    }
                    return parking;
                });

                if (parkingSpaces.length === 0) {
                    throw new Error('Parking space not found');
                }

                // Display parking numbers with proper formatting
                // For tandem: "P-004 - P-005", for single: "P-001"
                const numbers = parkingSpaces.map(p => p.parking_id).join(' - ');
                const numberText = document.createTextNode(`Parking: ${numbers}`);
                title.appendChild(numberText);

                // Add wheelchair icon if any parking has it
                const hasWheelchair = parkingSpaces.some(p => p.type === 'wheelchair');
                if (hasWheelchair) {
                    title.appendChild(document.createTextNode(' '));
                    title.appendChild(createWheelchairIcon());
                }

                header.appendChild(title);
                card.appendChild(header);

                // Residents list
                const residentsList = document.createElement('div');
                residentsList.className = 'residents-list';

                // Get all residents for these parking spaces
                const allResidents = new Set();
                parkingIds.forEach(parkingId => {
                    const residents = getResidentsForParking(parkingId, residentsData);
                    residents.forEach(r => allResidents.add(JSON.stringify(r)));
                });

                const uniqueResidents = Array.from(allResidents).map(r => JSON.parse(r));

                if (uniqueResidents.length === 0) {
                    const noResidents = document.createElement('div');
                    noResidents.className = 'resident-card';
                    noResidents.textContent = 'No residents assigned to this parking space';
                    residentsList.appendChild(noResidents);
                } else {
                    uniqueResidents.forEach(resident => {
                        const residentCard = createResidentCard(resident, parkingIds[0]);
                        residentsList.appendChild(residentCard);
                    });
                }

                card.appendChild(residentsList);
                container.appendChild(card);

            } catch (error) {
                console.error('Error rendering property details:', error);
                const container = document.getElementById('property-container');
                container.innerHTML = '<div class="error">Error loading property details. Please try again later.</div>';
            }
        }

        // Initialize on page load
        renderPropertyDetails();
    </script>
</body>
</html>
