<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Details - Calanit 16</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <style>
        /* Owner control panel */
        .owner-control-panel {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #0066cc;
        }

        .owner-message {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .status-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: #fff;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .status-option:hover {
            background-color: #f0f0f0;
        }

        .status-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .status-label {
            font-size: 16px;
            font-weight: 500;
            flex: 1;
        }

        .status-label.status-red {
            color: #dc3545;
        }

        .status-label.status-green {
            color: #28a745;
        }

        .status-label.status-grey {
            color: #666;
        }

        /* Property card status colors */
        .property-card.status-occupied {
            background-color: #ffe5e5;
            border: 2px solid #dc3545;
        }

        .property-card.status-free {
            background-color: #e5ffe5;
            border: 2px solid #28a745;
        }

        .property-card.status-default {
            background-color: #fff;
            border: none;
        }

        @media (max-width: 480px) {
            .owner-message {
                font-size: 14px;
            }

            .status-label {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">
        ←
    </a>

    <div class="container">
        <div id="property-container">
            <div class="loading">Loading property details...</div>
        </div>
    </div>

    <script type="module">
        import { getParkingData, getResidentsData, getResidentsForParking, getUserPhone, getResidentByPhone } from './src/js/data.js';

        /**
         * Get parking status from localStorage
         * @param {string} parkingId - Parking space ID
         * @returns {string|null} Status: 'occupied', 'free', or null (default)
         */
        function getParkingStatus(parkingId) {
            return localStorage.getItem(`parking_status_${parkingId}`);
        }

        /**
         * Set parking status in localStorage
         * @param {string} parkingId - Parking space ID
         * @param {string|null} status - Status: 'occupied', 'free', or null to clear
         */
        function setParkingStatus(parkingId, status) {
            if (status === null) {
                localStorage.removeItem(`parking_status_${parkingId}`);
            } else {
                localStorage.setItem(`parking_status_${parkingId}`, status);
            }

            // Update tile colors on index page
            updateTileColors();
        }

        /**
         * Update tile colors based on status
         */
        function updateTileColors() {
            // This will be handled by index.html on page load
            // Here we just store the status
        }

        /**
         * Get parking IDs from URL query parameter
         */
        function getParkingIdsFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            return id ? id.split(',') : [];
        }

        /**
         * Get display number from parking ID
         */
        function getParkingNumber(parkingId) {
            // Return full parking ID as in Google Sheets (e.g., "P-001")
            return parkingId;
        }

        /**
         * Create wheelchair icon
         */
        function createWheelchairIcon() {
            const icon = document.createElement('div');
            icon.className = 'wheelchair-icon';
            icon.innerHTML = '♿';
            return icon;
        }

        /**
         * Generate WhatsApp link
         */
        function generateWhatsAppLink(phone, firstName, parkingId) {
            // Remove non-digit characters from phone
            const cleanPhone = phone.replace(/\D/g, '');
            // Add Israel country code if not present
            const phoneNumber = cleanPhone.startsWith('972') ? cleanPhone : `972${cleanPhone.substring(1)}`;

            const message = `Hi ${firstName}, Can I borrow your parking space ${getParkingNumber(parkingId)} for a short time?`;
            return `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
        }

        /**
         * Create resident card element
         */
        function createResidentCard(resident, parkingId) {
            const card = document.createElement('div');
            card.className = 'resident-card';

            const name = document.createElement('div');
            name.className = 'resident-name';
            name.textContent = `${resident.first_name} ${resident.family_name}`;
            card.appendChild(name);

            const apartment = document.createElement('div');
            apartment.className = 'resident-apartment';
            apartment.textContent = `Apartment ${resident.apartment}`;
            card.appendChild(apartment);

            const whatsappLink = document.createElement('a');
            whatsappLink.className = 'contact-link';
            whatsappLink.href = generateWhatsAppLink(resident.phone, resident.first_name, parkingId);
            whatsappLink.target = '_blank';
            whatsappLink.innerHTML = `
                <svg class="whatsapp-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                </svg>
                ${resident.phone}
            `;
            card.appendChild(whatsappLink);

            return card;
        }

        /**
         * Create owner control panel
         * @param {string} parkingId - Parking space ID
         * @returns {HTMLElement} Control panel element
         */
        function createOwnerControlPanel(parkingId) {
            const panel = document.createElement('div');
            panel.className = 'owner-control-panel';

            const message = document.createElement('div');
            message.className = 'owner-message';
            message.textContent = 'This is your parking space. You can set its status to occupied, free, or reset this setting.';
            panel.appendChild(message);

            const statusControls = document.createElement('div');
            statusControls.className = 'status-controls';

            // Get current status
            const currentStatus = getParkingStatus(parkingId);

            // Radio buttons
            const statuses = [
                { value: 'occupied', label: 'Occupied', color: 'red' },
                { value: 'free', label: 'Free', color: 'green' },
                { value: 'default', label: 'Reset setting', color: 'grey' }
            ];

            statuses.forEach(status => {
                const label = document.createElement('label');
                label.className = 'status-option';

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `status_${parkingId}`;
                radio.value = status.value;
                radio.checked = (status.value === 'default' && !currentStatus) || currentStatus === status.value;

                // Add change handler
                radio.addEventListener('change', () => {
                    if (status.value === 'default') {
                        setParkingStatus(parkingId, null);
                    } else {
                        setParkingStatus(parkingId, status.value);
                    }
                    // Update card background
                    updateCardBackground(parkingId, status.value);
                });

                const span = document.createElement('span');
                span.textContent = status.label;
                span.className = `status-label status-${status.color}`;

                label.appendChild(radio);
                label.appendChild(span);
                statusControls.appendChild(label);
            });

            panel.appendChild(statusControls);
            return panel;
        }

        /**
         * Update card background color based on status
         * @param {string} parkingId - Parking space ID
         * @param {string} status - Status: 'occupied', 'free', or 'default'
         */
        function updateCardBackground(parkingId, status) {
            const card = document.querySelector('.property-card');
            if (!card) return;

            // Remove existing status classes
            card.classList.remove('status-occupied', 'status-free', 'status-default');

            // Add new status class
            if (status === 'occupied') {
                card.classList.add('status-occupied');
            } else if (status === 'free') {
                card.classList.add('status-free');
            } else {
                card.classList.add('status-default');
            }
        }

        /**
         * Render property details
         */
        async function renderPropertyDetails() {
            try {
                const parkingIds = getParkingIdsFromUrl();

                if (parkingIds.length === 0) {
                    throw new Error('No parking ID specified');
                }

                const parkingData = await getParkingData();
                const residentsData = await getResidentsData();
                const userPhone = getUserPhone();
                const currentUser = getResidentByPhone(userPhone, residentsData);

                const container = document.getElementById('property-container');
                container.innerHTML = '';

                // Create property card
                const card = document.createElement('div');
                card.className = 'property-card';

                // Get parking details
                // If parking not found in data, create virtual object (for tandem partners)
                const parkingSpaces = parkingIds.map(id => {
                    let parking = parkingData.find(p => p.parking_id === id);
                    if (!parking) {
                        // Create virtual parking object for missing tandem partner
                        parking = {
                            parking_id: id,
                            type: 'tandem',
                            linked_id: ''
                        };
                    }
                    return parking;
                });

                if (parkingSpaces.length === 0) {
                    throw new Error('Parking space not found');
                }

                // Header with parking number(s)
                const header = document.createElement('div');
                header.className = 'property-header';

                const title = document.createElement('h2');
                title.className = 'property-title';

                // Display parking numbers with proper formatting
                // For tandem: "P-004 - P-005", for single: "P-001"
                const numbers = parkingSpaces.map(p => p.parking_id).join(' - ');
                const numberText = document.createTextNode(`Parking: ${numbers}`);
                title.appendChild(numberText);

                // Add wheelchair icon if any parking has it
                const hasWheelchair = parkingSpaces.some(p => p.type === 'wheelchair');
                if (hasWheelchair) {
                    title.appendChild(document.createTextNode(' '));
                    title.appendChild(createWheelchairIcon());
                }

                header.appendChild(title);
                card.appendChild(header);

                // Check if current user owns this parking space
                const isOwner = currentUser && parkingIds.some(parkingId => {
                    const parkingSpacesOwned = currentUser.parking_spaces.split(',').map(p => p.trim());
                    return parkingSpacesOwned.includes(parkingId);
                });

                // Residents list or owner control
                const residentsList = document.createElement('div');
                residentsList.className = 'residents-list';

                if (isOwner) {
                    // Show owner control panel
                    const ownerPanel = createOwnerControlPanel(parkingIds[0]);
                    residentsList.appendChild(ownerPanel);

                    // Apply current status to card
                    const currentStatus = getParkingStatus(parkingIds[0]) || 'default';
                    updateCardBackground(parkingIds[0], currentStatus);
                } else {
                    // Show residents as before
                    // Get all residents for these parking spaces
                    const allResidents = new Set();
                    parkingIds.forEach(parkingId => {
                        const residents = getResidentsForParking(parkingId, residentsData);
                        residents.forEach(r => allResidents.add(JSON.stringify(r)));
                    });

                    const uniqueResidents = Array.from(allResidents).map(r => JSON.parse(r));

                    if (uniqueResidents.length === 0) {
                        const noResidents = document.createElement('div');
                        noResidents.className = 'resident-card';
                        noResidents.textContent = 'No residents assigned to this parking space';
                        residentsList.appendChild(noResidents);
                    } else {
                        uniqueResidents.forEach(resident => {
                            const residentCard = createResidentCard(resident, parkingIds[0]);
                            residentsList.appendChild(residentCard);
                        });
                    }
                }

                card.appendChild(residentsList);
                container.appendChild(card);

            } catch (error) {
                console.error('Error rendering property details:', error);
                const container = document.getElementById('property-container');
                container.innerHTML = '<div class="error">Error loading property details. Please try again later.</div>';
            }
        }

        // Initialize on page load
        renderPropertyDetails();
    </script>
</body>
</html>
